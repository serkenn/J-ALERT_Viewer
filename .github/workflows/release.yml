name: Release

# Build native binaries for Linux/Windows on every v* tag and attach them to a
# GitHub Release. The binary is self-contained (font + web UI are embedded).
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
            archive: tar.gz
          - os: windows-latest
            rid: win-x64
            ext: '.exe'
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgl1-mesa-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eu
          NAME="jalert-receiver-${GITHUB_REF_NAME}-${{ matrix.rid }}"
          mkdir -p "stage/$NAME"
          cp "target/release/jalert-receiver${{ matrix.ext }}" "stage/$NAME/"
          cp README.md LICENSE "stage/$NAME/"
          tar -C stage -czf "$NAME.tar.gz" "$NAME"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "jalert-receiver-$env:GITHUB_REF_NAME-${{ matrix.rid }}"
          New-Item -ItemType Directory -Force "stage/$name" | Out-Null
          Copy-Item "target/release/jalert-receiver${{ matrix.ext }}" "stage/$name/"
          Copy-Item README.md,LICENSE "stage/$name/"
          Compress-Archive -Path "stage/$name" -DestinationPath "$name.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: |
            *.tar.gz
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
