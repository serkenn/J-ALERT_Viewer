<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>J-ALERT 受信表示</title>
<style>
  :root{ --warning:#e60012; --emergency:#9a0e8e; --advisory:#f2c200; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP","Meiryo",system-ui,sans-serif;
    background:#000;color:#fff;overflow:hidden;user-select:none}
  #app{position:fixed;inset:0}

  /* ===== standby (jars2000 homage) ===== */
  #standby{position:absolute;inset:0;background:#000;overflow:hidden}
  #standby .stars{position:absolute;inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 15%,#fff,transparent),
      radial-gradient(1px 1px at 70% 25%,#cfe,transparent),
      radial-gradient(1.5px 1.5px at 40% 35%,#fff,transparent),
      radial-gradient(1px 1px at 85% 12%,#fff,transparent),
      radial-gradient(1px 1px at 55% 8%,#bcd,transparent),
      radial-gradient(1.5px 1.5px at 12% 40%,#fff,transparent),
      radial-gradient(1px 1px at 90% 45%,#fff,transparent),
      radial-gradient(1px 1px at 33% 20%,#fff,transparent);
    opacity:.85}
  #standby .earth{position:absolute;left:50%;bottom:-62vw;transform:translateX(-50%);
    width:124vw;height:124vw;border-radius:50%;
    background:radial-gradient(circle at 42% 30%,#15466e 0%,#0a2c4c 38%,#071a33 60%,#04101f 100%);
    box-shadow:0 0 60px 8px rgba(54,143,224,.35),inset 0 0 120px rgba(0,0,0,.6)}
  #standby .earth::after{content:"";position:absolute;inset:-4px;border-radius:50%;
    border:3px solid rgba(54,143,224,.55);filter:blur(1px)}
  #standby .logo{position:absolute;top:13%;left:0;right:0;text-align:center;
    font-size:13vh;font-weight:800;font-style:italic;letter-spacing:.06em;
    color:#ff2a1f;text-shadow:0 0 18px rgba(255,42,31,.55),0 3px 0 #6a0d0a}
  #standby .cats{position:absolute;top:34%;left:11%;display:flex;flex-direction:column;gap:1.1em}
  #standby .cats div{display:flex;align-items:center;gap:.5em;font-size:4.6vh;font-weight:600;color:#e9eef6}
  #standby .cats div::before{content:"";width:.62em;height:.62em;background:#e9eef6;display:inline-block}
  #standby .cats div.lit::before{background:#ff3a2a;box-shadow:0 0 12px #ff3a2a}
  #standby .cats div.lit{color:#ffd5d0}
  #standby .clock{position:absolute;top:5%;right:4%;text-align:right}
  #standby .clock .t{font-size:6vh;font-variant-numeric:tabular-nums;color:#dfe7ff}
  #standby .clock .d{font-size:3vh;color:#9dabcf}
  #standby .health{position:absolute;bottom:5%;left:4%;font-size:2.8vh;color:#35d986}

  /* ===== alert ===== */
  #alert{position:absolute;inset:0;display:none;flex-direction:column;color:#fff}
  #alert.on{display:flex}
  #alert.warning{background:linear-gradient(160deg,#c00010,#7d0009)}
  #alert.emergency{background:linear-gradient(160deg,#9a0bb0,#3a0146)}
  #alert .flash{position:absolute;inset:0;background:#fff;opacity:0;mix-blend-mode:overlay;
    animation:flash 1.1s steps(1) infinite;pointer-events:none}
  @keyframes flash{0%,55%{opacity:0}60%,74%{opacity:.16}}
  #alert .head{display:flex;align-items:center;gap:3vw;padding:3vh 4vw 2vh;
    background:rgba(0,0,0,.30);border-bottom:3px solid rgba(255,255,255,.35)}
  #alert .sev{font-size:12vh;font-weight:900;line-height:1;text-shadow:0 3px 10px rgba(0,0,0,.5)}
  #alert .head .meta{flex:1;min-width:0}
  #alert .area{font-size:7.2vh;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #alert .it{display:inline-block;margin-top:.4vh;font-size:3vh;background:rgba(255,255,255,.2);
    padding:.2vh 1vw;border-radius:6px}
  #alert .body{flex:1;padding:3vh 5vw;overflow:hidden}
  #alert .kinds{display:flex;flex-wrap:wrap;gap:1.4vh;margin-bottom:3vh}
  #alert .kind{font-size:5vh;font-weight:800;background:rgba(0,0,0,.32);
    border:2px solid rgba(255,255,255,.5);border-radius:12px;padding:.2vh 1.2vw}
  #alert .headline{font-size:4.4vh;font-weight:600;line-height:1.5;text-shadow:0 2px 6px rgba(0,0,0,.45)}
  #alert .areas{margin-top:2vh;font-size:2.6vh;color:rgba(255,255,255,.85)}
  #alert .foot{display:flex;gap:3vw;padding:2vh 4vw;background:rgba(0,0,0,.34);font-size:2.6vh}
  #alert .foot .sp{flex:1}

  .advbar{position:absolute;left:0;right:0;bottom:0;background:var(--advisory);color:#111;
    display:none;align-items:center;gap:2vw;padding:1.6vh 2vw;font-weight:700;font-size:2.6vh;z-index:3}
  .advbar.on{display:flex}
  .advbar .tag{background:#111;color:var(--advisory);padding:.3vh 1vw;border-radius:5px;font-size:2.4vh}
</style>
</head>
<body>
<div id="app">
  <section id="standby">
    <div class="stars"></div>
    <div class="earth"></div>
    <div class="logo">J-ALERT</div>
    <div class="cats"><div data-grp="国民保護">国民保護に関する情報</div><div data-grp="地震">地震情報</div><div data-grp="津波">津波情報</div><div data-grp="火山">火山情報</div></div>
    <div class="clock"><div class="t" id="clk">--:--:--</div><div class="d" id="dat"></div></div>
    <div class="health">● 受信待機中 / 異常なし</div>
  </section>

  <section id="alert">
    <div class="flash"></div>
    <div class="head">
      <div class="sev" id="sev">警報</div>
      <div class="meta"><div class="area" id="area"></div><span class="it" id="it"></span></div>
    </div>
    <div class="body">
      <div class="kinds" id="kinds"></div>
      <div class="headline" id="hl"></div>
      <div class="areas" id="areas"></div>
    </div>
    <div class="foot"><span id="rt"></span><span class="sp"></span><span id="rx"></span></div>
  </section>

  <div class="advbar" id="adv"><span class="tag">注意報</span><span id="advtxt"></span></div>
</div>

<script>
const $=s=>document.querySelector(s);
const SEV={2:"warning",3:"emergency"}, LBL={2:"警報",3:"特別警報"};
const WK=["日","月","火","水","木","金","土"];
function pad(n){return String(n).padStart(2,"0");}
function tick(){const d=new Date();$("#clk").textContent=`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  $("#dat").textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${WK[d.getDay()]})`;}
setInterval(tick,250);tick();
function hms(ms){if(!ms)return"—";const d=new Date(ms);return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}
function rep(iso){if(!iso)return"—";const d=new Date(iso);return isNaN(d)?iso:`${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;}

// Which standby lamp a category belongs to.
function grpOf(cat){
  if(!cat) return null;
  if(cat.indexOf("国民保護")>=0) return "国民保護";
  if(cat.indexOf("地震")>=0||cat.indexOf("震度")>=0) return "地震";
  if(cat.indexOf("津波")>=0) return "津波";
  if(cat.indexOf("火山")>=0||cat.indexOf("噴火")>=0) return "火山";
  return null;
}

function render(s){
  const alertOn = s.mode==="alert" && s.primary;
  $("#alert").classList.toggle("on",!!alertOn);
  $("#standby").style.display = alertOn ? "none":"block";

  // light the standby category lamps for anything currently active
  const lit=new Set();
  for(const a of (s.alerts||[]).concat(s.advisories||[])){ const g=grpOf(a.category); if(g) lit.add(g); }
  document.querySelectorAll("#standby .cats div").forEach(d=>d.classList.toggle("lit",lit.has(d.dataset.grp)));

  // advisory banner (when not full alert)
  const adv=$("#adv");
  if(!alertOn && (s.advisories||[]).length){
    $("#advtxt").textContent=s.advisories.map(a=>`【${a.areaName}】`+((a.kinds||[]).join("・")||a.category||"")).join("　／　");
    adv.classList.add("on");
  } else adv.classList.remove("on");

  if(alertOn){
    const p=s.primary, sev=SEV[p.severity]||"warning";
    const al=$("#alert"); al.classList.remove("warning","emergency"); al.classList.add(sev);
    $("#sev").textContent = p.category==="気象警報・注意報" ? (LBL[p.severity]||"警報") : (p.category||LBL[p.severity]||"警報");
    $("#area").textContent=p.areaName||p.headTitle||"";
    let it=p.infoType||"発表"; if((s.alerts||[]).length>1) it+=`　／　他 ${s.alerts.length-1} 件発表中`;
    $("#it").textContent=it;
    $("#kinds").innerHTML=(p.kinds||[]).map(k=>`<span class="kind">${esc(k)}</span>`).join("");
    $("#hl").textContent=p.headline||"";
    const sub=(p.areas||[]).filter(a=>a&&a!==p.areaName);
    $("#areas").textContent=sub.length?`対象地域　${sub.join("　")}`:"";
    $("#rt").textContent=`発表時刻 ${rep(p.reportTime)}`;
    $("#rx").textContent=`受信 ${hms(p.rxTimeMs)}`;
  }
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

async function poll(){ try{ render(await (await fetch("/api/state",{cache:"no-store"})).json()); }catch(_){} }
poll(); setInterval(poll,1000);
</script>
</body>
</html>
