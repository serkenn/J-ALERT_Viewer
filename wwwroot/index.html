<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>J-ALERT 受信表示</title>
<style>
  :root{
    --bg:#0a1020; --bg2:#0e1830; --ink:#e8eefc; --muted:#7e8db5;
    --line:#1d2b4d; --ok:#27d07a; --advisory:#f2c200;
    --warning:#e60012; --emergency:#7a0a8c;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP","Meiryo",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; overflow:hidden;
    user-select:none;
  }
  #app{height:100vh;display:flex;flex-direction:column}

  /* ---- top status strip (always visible) ---- */
  .topbar{
    flex:0 0 auto;display:flex;align-items:center;gap:14px;
    padding:10px 20px;background:rgba(0,0,0,.28);
    border-bottom:1px solid var(--line);font-size:15px;color:var(--muted);
    letter-spacing:.04em;z-index:5;
  }
  .topbar .brand{color:var(--ink);font-weight:700;letter-spacing:.12em}
  .dot{width:10px;height:10px;border-radius:50%;background:#555;display:inline-block;margin-right:6px;vertical-align:middle}
  .dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .dot.off{background:var(--warning)}
  .topbar .spacer{flex:1}
  .topbar .stat b{color:var(--ink);font-weight:600}
  .mute{cursor:pointer;border:1px solid var(--line);border-radius:6px;padding:3px 10px;color:var(--muted)}
  .mute.armed{color:var(--ok);border-color:var(--ok)}
  #unreadBadge{display:none;margin-left:7px;background:var(--warning);color:#fff;
    border-radius:10px;padding:1px 8px;font-size:13px;font-weight:700}
  #unreadBadge.show{display:inline-block}

  .stage{flex:1;position:relative;overflow:hidden}
  .screen{position:absolute;inset:0;display:flex;opacity:0;transition:opacity .35s ease;pointer-events:none}
  .screen.show{opacity:1;pointer-events:auto}

  /* ---- standby ---- */
  #standby{flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 38%,var(--bg2),var(--bg) 70%);}
  #standby .wait{color:var(--muted);font-size:clamp(18px,2.4vw,30px);letter-spacing:.5em;margin-bottom:.4em;text-indent:.5em}
  #standby .clock{font-size:clamp(70px,15vw,200px);font-weight:200;line-height:1;
    font-variant-numeric:tabular-nums;letter-spacing:.02em}
  #standby .date{font-size:clamp(20px,3.2vw,40px);color:#aab6dd;margin-top:.25em;font-weight:300;letter-spacing:.18em}
  #standby .health{margin-top:2.2em;display:flex;align-items:center;gap:12px;
    color:var(--ok);font-size:clamp(16px,1.8vw,24px);letter-spacing:.2em}
  #standby .health .ring{width:14px;height:14px;border-radius:50%;background:var(--ok);box-shadow:0 0 14px var(--ok);animation:breath 2.6s ease-in-out infinite}
  @keyframes breath{0%,100%{opacity:.45;transform:scale(.85)}50%{opacity:1;transform:scale(1.12)}}

  /* advisory banner over standby */
  .advisory-bar{position:absolute;left:0;right:0;bottom:0;background:var(--advisory);color:#111;
    display:none;align-items:center;gap:18px;padding:14px 26px;font-weight:700;
    box-shadow:0 -6px 24px rgba(0,0,0,.4)}
  .advisory-bar.show{display:flex}
  .advisory-bar .tag{background:#111;color:var(--advisory);padding:4px 12px;border-radius:5px;font-size:18px;letter-spacing:.14em}
  .advisory-bar .scroll{flex:1;overflow:hidden;white-space:nowrap;font-size:clamp(16px,1.9vw,24px)}
  .advisory-bar .scroll span{display:inline-block;padding-left:100%;animation:marq 22s linear infinite}
  @keyframes marq{to{transform:translateX(-100%)}}

  /* ---- alert (full screen) ---- */
  #alert{flex-direction:column;color:#fff}
  #alert.sev-warning{background:linear-gradient(160deg,#c00010,#7d0009)}
  #alert.sev-emergency{background:linear-gradient(160deg,#9a0bb0,#3a0146)}
  #alert .flash{position:absolute;inset:0;pointer-events:none;mix-blend-mode:overlay;
    background:#fff;opacity:0;animation:flash 1.1s steps(1) infinite}
  @keyframes flash{0%,55%{opacity:0}60%,72%{opacity:.18}}
  #alert .head{flex:0 0 auto;display:flex;align-items:center;gap:24px;padding:26px 40px;
    background:rgba(0,0,0,.30);border-bottom:3px solid rgba(255,255,255,.35)}
  #alert .sevlabel{font-size:clamp(40px,7vw,96px);font-weight:900;letter-spacing:.12em;
    padding:0 .25em;line-height:1.05;text-shadow:0 3px 10px rgba(0,0,0,.5)}
  #alert .head .meta{flex:1;min-width:0}
  #alert .area{font-size:clamp(28px,4.6vw,62px);font-weight:800;letter-spacing:.05em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #alert .info-type{display:inline-block;margin-top:6px;font-size:clamp(16px,2vw,26px);
    background:rgba(255,255,255,.2);padding:3px 14px;border-radius:6px;letter-spacing:.2em}
  #alert .count{font-size:clamp(14px,1.5vw,20px);opacity:.8;text-align:right;white-space:nowrap}

  #alert .body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:30px 50px;overflow:hidden}
  #alert .kinds{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:28px}
  #alert .kind{font-size:clamp(24px,3.6vw,48px);font-weight:800;background:rgba(0,0,0,.32);
    border:2px solid rgba(255,255,255,.5);border-radius:12px;padding:.18em .55em;letter-spacing:.04em}
  #alert .headline{font-size:clamp(22px,3.2vw,44px);font-weight:600;line-height:1.5;
    text-shadow:0 2px 6px rgba(0,0,0,.45)}
  #alert .areas{margin-top:22px;font-size:clamp(15px,1.8vw,24px);color:rgba(255,255,255,.85);line-height:1.6}
  #alert .areas .lbl{opacity:.7;margin-right:.6em}

  #alert .foot{flex:0 0 auto;display:flex;gap:30px;align-items:center;padding:18px 40px;
    background:rgba(0,0,0,.34);font-size:clamp(14px,1.6vw,22px);letter-spacing:.06em}
  #alert .foot .spacer{flex:1}
  #alert .foot a{color:#fff;opacity:.7;text-decoration:underline;cursor:pointer}
  /* other concurrent alerts */
  #alert .more{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  #alert .more .chip{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.4);
    border-radius:8px;padding:6px 14px;font-size:clamp(14px,1.6vw,22px)}

  .hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="brand">J-ALERT</span>
    <span class="stat"><span id="dot" class="dot"></span><span id="connText">未接続</span></span>
    <span class="stat">受信元 <b id="src">—</b></span>
    <span class="stat">受信 <b id="lines">0</b> 件</span>
    <span class="stat">最終受信 <b id="last">—</b></span>
    <span class="spacer"></span>
    <a class="mute" href="/inbox" style="text-decoration:none">📥 受信箱<span id="unreadBadge"></span></a>
    <span id="mute" class="mute">🔔 音声OFF</span>
  </div>

  <div class="stage">
    <!-- standby -->
    <section id="standby" class="screen">
      <div class="wait">受 信 待 機 中</div>
      <div id="clock" class="clock">--:--:--</div>
      <div id="date" class="date">----年--月--日 (-)</div>
      <div class="health"><span class="ring"></span><span>異常なし</span></div>
      <div id="advBar" class="advisory-bar">
        <span class="tag">注意報</span>
        <div class="scroll"><span id="advText"></span></div>
      </div>
    </section>

    <!-- full-screen alert -->
    <section id="alert" class="screen">
      <div class="flash"></div>
      <div class="head">
        <div id="sevlabel" class="sevlabel">警報</div>
        <div class="meta">
          <div id="area" class="area">—</div>
          <span id="infoType" class="info-type">発表</span>
        </div>
        <div id="count" class="count"></div>
      </div>
      <div class="body">
        <div id="kinds" class="kinds"></div>
        <div id="headline" class="headline"></div>
        <div id="areas" class="areas"></div>
        <div id="more" class="more"></div>
      </div>
      <div class="foot">
        <span>発表時刻 <b id="reportTime">—</b></span>
        <span>受信 <b id="rxTime">—</b></span>
        <span class="spacer"></span>
        <a id="xmlLink" target="_blank">XML原文</a>
      </div>
    </section>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const SEV = {1:"advisory",2:"warning",3:"emergency"};
const SEVLABEL = {2:"警報",3:"特別警報"};
const WEEK = ["日","月","火","水","木","金","土"];
let clockOffset = 0;          // serverTime - clientTime
let state = null;

// ---------- clock ----------
function pad(n){return String(n).padStart(2,"0");}
function tick(){
  const d = new Date(Date.now()+clockOffset);
  $("#clock").textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  $("#date").textContent  = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 (${WEEK[d.getDay()]})`;
}
setInterval(tick,250); tick();

function fmtTime(ms){
  if(!ms) return "—";
  const d=new Date(ms);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function fmtReport(iso){
  if(!iso) return "—";
  const d=new Date(iso); if(isNaN(d)) return iso;
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ---------- render ----------
function render(s){
  state = s;
  if(s.serverTimeMs) clockOffset = s.serverTimeMs - Date.now();

  // status bar
  const r = s.receiver||{};
  $("#dot").className = "dot " + (r.connected ? "on":"off");
  $("#connText").textContent = r.connected ? "接続中" : "切断";
  $("#src").textContent = r.source || "—";
  $("#lines").textContent = r.totalLines||0;
  $("#last").textContent = fmtTime(r.lastLineMs);

  const badge=$("#unreadBadge");
  if(s.unread>0){ badge.textContent=s.unread; badge.classList.add("show"); }
  else badge.classList.remove("show");

  const alertOn = s.mode === "alert";
  showScreen(alertOn ? "alert" : "standby");

  // advisory banner (only when not in full alert)
  const advBar = $("#advBar");
  if(!alertOn && (s.advisories||[]).length){
    const txt = s.advisories.map(a => `【${a.areaName||a.headTitle}】` +
                a.kinds.map(k=>k.name).join("・")).join("　／　");
    $("#advText").textContent = txt + "　";
    advBar.classList.add("show");
  } else advBar.classList.remove("show");

  if(alertOn) renderAlert(s);
  updateAudio(s);
}

function showScreen(id){
  for(const el of document.querySelectorAll(".screen"))
    el.classList.toggle("show", el.id===id);
}

function renderAlert(s){
  const p = s.primary; if(!p) return;
  const sev = SEV[p.severity]||"warning";
  const al = $("#alert");
  al.classList.remove("sev-warning","sev-emergency");
  al.classList.add("sev-"+sev);

  $("#sevlabel").textContent = SEVLABEL[p.severity]||"警報";
  $("#area").textContent = p.areaName || p.headTitle || "";
  $("#infoType").textContent = p.infoType || "発表";

  $("#kinds").innerHTML = "";
  for(const k of p.kinds||[]){
    const el=document.createElement("div"); el.className="kind"; el.textContent=k.name;
    $("#kinds").appendChild(el);
  }
  $("#headline").textContent = p.headline || "";
  const areas = (p.areas||[]).filter(a=>a && a!==p.areaName);
  $("#areas").innerHTML = areas.length
    ? `<span class="lbl">対象地域</span>${areas.join("　")}` : "";

  $("#reportTime").textContent = fmtReport(p.reportTime);
  $("#rxTime").textContent = fmtTime(p.rxTimeMs);
  $("#xmlLink").href = "/api/xml?key=" + encodeURIComponent(p.key);

  // other concurrent warnings
  const others = (s.alerts||[]).filter(a=>a.key!==p.key);
  $("#count").textContent = s.alerts.length>1 ? `他 ${s.alerts.length-1} 件発表中` : "";
  $("#more").innerHTML = "";
  for(const a of others){
    const el=document.createElement("div"); el.className="chip";
    el.textContent = `${SEVLABEL[a.severity]||""} ${a.areaName||a.headTitle}：` +
                     (a.kinds||[]).map(k=>k.name).join("・");
    $("#more").appendChild(el);
  }
}

// ---------- audio (alert chime) ----------
let audioCtx=null, chimeTimer=null, audioArmed=false, lastAlertKey=null;
$("#mute").addEventListener("click",()=>{
  audioArmed=!audioArmed;
  $("#mute").classList.toggle("armed",audioArmed);
  $("#mute").textContent = audioArmed ? "🔔 音声ON" : "🔔 音声OFF";
  if(audioArmed){ ensureAudio(); if(state&&state.mode==="alert") startChime(state.primary); }
  else stopChime();
});
function ensureAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
}
function beep(freq,dur,when){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type="sine"; o.frequency.value=freq;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.0001,when);
  g.gain.exponentialRampToValueAtTime(0.5,when+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,when+dur);
  o.start(when); o.stop(when+dur+0.02);
}
function playPattern(emergency){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;
  if(emergency){ beep(880,0.18,t); beep(660,0.18,t+0.22); beep(880,0.18,t+0.44); beep(660,0.28,t+0.66); }
  else { beep(760,0.2,t); beep(560,0.2,t+0.26); }
}
function startChime(p){
  if(!audioArmed||!p) return;
  ensureAudio(); stopChime();
  const emerg = p.severity===3;
  playPattern(emerg);
  chimeTimer=setInterval(()=>playPattern(emerg), emerg?1400:2600);
}
function stopChime(){ if(chimeTimer){clearInterval(chimeTimer);chimeTimer=null;} }
function updateAudio(s){
  if(s.mode!=="alert"){ stopChime(); lastAlertKey=null; return; }
  const key=s.primary?s.primary.key+"/"+s.primary.severity:null;
  if(key!==lastAlertKey){ lastAlertKey=key; startChime(s.primary); }
}

// ---------- live stream ----------
function connect(){
  const es=new EventSource("/events");
  es.onmessage=e=>{ try{ render(JSON.parse(e.data)); }catch(_){}};
  es.onerror=()=>{ es.close(); $("#dot").className="dot off"; setTimeout(connect,2000); };
}
connect();
</script>
</body>
</html>
